<style>
:root{
  --bg:#04060f;--bg2:#080c1c;--bg3:#0d1228;

  --cyan:#38dcff;--volt:#b8ff47;--vio:#a78bfa;--gold:#ffc145;--coral:#ff5f6d;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Sora',sans-serif;color:var(--ink2)}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;
  background:rgba(8,12,28,0.88);backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);

.sidebar.collapsed{transform:translateX(-230px)}
.sidebar::-webkit-scrollbar{width:3px}

/* LEGEND */

  transition:left 0.3s cubic-bezier(0.4,0,0.2,1);}
#legend.wide{left:20px}
.leg-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:var(--ink2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* CONTROLS */

  <div class="leg-title" style="margin-bottom:8px">Connections</div>
  <div class="leg-row"><div class="leg-line" style="background:rgba(56,220,255,0.6)"></div>Strong link</div>
  <div class="leg-row"><div class="leg-line" style="background:rgba(255,255,255,0.15)"></div>Weak link</div>
  </div>
  <div style="margin-top:8px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace">Drag to pan · Scroll to zoom</div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const NODES = [
  // Core Framework (red)
  { id:'m1',  label:'M1',  title:'Policy Objectives',      cat:'core',    desc:'Low inflation, full employment, economic growth, BoP equilibrium. The 4 macro goals that government policy aims to achieve.',
    links:['m2','m15','m16','m17','m7','m9','m11'] },
  { id:'m2',  label:'M2',  title:'Circular Flow',          cat:'core',    desc:'The flow of income between households, firms, government and overseas. Injections (G,I,X) and withdrawals (T,S,M).',
    links:['m3','m13','m15','m19'] },

  // Demand & Supply (violet)
  { id:'m3',  label:'M3',  title:'Aggregate Demand',       cat:'demand',  desc:'AD = C + I + G + (X−M). Total demand for goods and services in the economy at any price level.',
    links:['m4','m5','m6','m15','m16','m7','m8'] },
  { id:'m4',  label:'M4',  title:'AD Curve',               cat:'demand',  desc:'The AD curve slopes downward. Shifts caused by changes in C, I, G or net exports.',
    links:['m3','m6','m8','m11'] },
  { id:'m5',  label:'M5',  title:'Aggregate Supply',       cat:'demand',  desc:'SRAS slopes upward (sticky wages). LRAS is vertical at full employment output.',
    links:['m6','m17','m11','m12','m7'] },
  { id:'m6',  label:'M6',  title:'Macro Equilibrium',      cat:'demand',  desc:'Where AD = AS. Determines price level and real output. Output gaps occur when actual ≠ potential GDP.',
    links:['m3','m5','m7','m8','m9','m11','m13'] },

  // Measurement & Indicators (cyan)
  { id:'m7',  label:'M7',  title:'Inflation Measurement',  cat:'measure', desc:'CPI measures a basket of goods. RPI includes housing. Bank of England targets 2% CPI.',
    links:['m8','m1','m16','m21'] },
  { id:'m8',  label:'M8',  title:'Inflation Causes',       cat:'measure', desc:'Demand-pull (excess AD) and cost-push (rising costs). Also imported inflation via exchange rates.',
    links:['m7','m3','m5','m15','m16','m21'] },
  { id:'m9',  label:'M9',  title:'Unemployment Measure',   cat:'measure', desc:'ILO and claimant count measures. Types: frictional, structural, cyclical, seasonal.',
    links:['m10','m1','m11','m17'] },
  { id:'m10', label:'M10', title:'Unemployment Causes',    cat:'measure', desc:'Cyclical (lack of AD), structural (skills mismatch), frictional (between jobs). Phillips Curve trade-off.',
    links:['m9','m6','m15','m17','m8'] },
  { id:'m11', label:'M11', title:'Economic Growth',        cat:'measure', desc:'Increase in real GDP. Actual growth uses spare capacity; potential growth shifts LRAS right.',
    links:['m12','m6','m13','m1','m9','m15'] },
  { id:'m12', label:'M12', title:'Growth Causes',          cat:'measure', desc:'Investment, technology, human capital, natural resources. Shown as rightward LRAS shift.',
    links:['m11','m5','m17','m15'] },
  { id:'m13', label:'M13', title:'The Multiplier',         cat:'measure', desc:'1/MPS. An injection causes a larger final increase in national income through successive rounds of spending.',
    links:['m2','m6','m15','m11'] },
  { id:'m14', label:'M14', title:'Macro Indicators',       cat:'measure', desc:'GDP, unemployment rate, inflation, current account balance. Used to assess economic performance.',
    links:['m1','m7','m9','m11','m19'] },

  // Policy (volt)
  { id:'m15', label:'M15', title:'Fiscal Policy',          cat:'policy',  desc:'Government spending and taxation to influence AD. Expansionary (↑G/↓T) or contractionary (↓G/↑T).',
    links:['m3','m13','m1','m16','m10','m12','m17'] },
  { id:'m16', label:'M16', title:'Monetary Policy',        cat:'policy',  desc:'Interest rates and QE set by Bank of England MPC. Targets 2% CPI inflation.',
    links:['m3','m7','m8','m1','m15','m21'] },
  { id:'m17', label:'M17', title:'Supply-Side Policy',     cat:'policy',  desc:'Improve productive capacity: education, R&D, deregulation, privatisation. Shifts LRAS right.',
    links:['m5','m12','m9','m10','m1','m15'] },

  // International (gold)
  { id:'m19', label:'M19', title:'Balance of Payments',    cat:'intl',    desc:'Records all transactions between UK and rest of world. Current, capital and financial accounts.',
    links:['m20','m21','m1','m3','m19'] },
  { id:'m20', label:'M20', title:'BoP Imbalances',         cat:'intl',    desc:'Current account deficit means imports > exports. Can be corrected by depreciation, deflation or supply-side.',
    links:['m19','m21','m15','m16','m17'] },
  { id:'m21', label:'M21', title:'Exchange Rates',         cat:'intl',    desc:'Price of £ in terms of other currencies. Floating rates determined by supply/demand. Affects inflation and BoP.',
    links:['m20','m8','m3','m16','m19'] },
];

const CAT_COLORS = {
  core:    '#ff5f6d',
  demand:  '#a78bfa',
  measure: '#38dcff',
  policy:  '#b8ff47',
  intl:    '#ffc145',
};

// Strong connections (bidirectional, thicker)
const STRONG = new Set([
  'm3-m6','m5-m6','m3-m4','m1-m15','m1-m16','m7-m8','m9-m10',
  'm11-m12','m13-m15','m15-m16','m19-m20','m20-m21','m6-m8','m6-m11',
  'm16-m7','m2-m13','m5-m17',
]);
function isStrong(a,b) {
  return STRONG.has(`${a}-${b}`) || STRONG.has(`${b}-${a}`);
}

// ── LAYOUT: place nodes in organic circular clusters ─────────────────────────
function layoutNodes(cw, ch) {
  const cx = cw / 2, cy = ch / 2;
  // Cluster centres
  const clusters = {
    core:    { x: cx,       y: cy - 20 },
    demand:  { x: cx - 220, y: cy - 80 },
    measure: { x: cx + 30,  y: cy - 200 },
    policy:  { x: cx - 180, y: cy + 160 },
    intl:    { x: cx + 220, y: cy + 120 },
  };
  const catNodes = {};
  NODES.forEach(n => { (catNodes[n.cat] = catNodes[n.cat]||[]).push(n); });
  
  NODES.forEach(n => {
    const c = clusters[n.cat];
    const siblings = catNodes[n.cat];
    const idx = siblings.indexOf(n);
    const total = siblings.length;
    const angle = (idx / total) * Math.PI * 2 - Math.PI / 2;
    const r = total === 1 ? 0 : (total <= 3 ? 70 : total <= 5 ? 100 : 120);
    n.x = c.x + Math.cos(angle) * r;
    n.y = c.y + Math.sin(angle) * r;
    n.vx = 0; n.vy = 0;
    n.r = n.cat === 'core' ? 30 : 24;
  });
}

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let W, H, offsetX = 0, offsetY = 0, scale = 1;
let dragging = false, lastMX = 0, lastMY = 0;
let hoveredNode = null, showLabels = true;

function resize() {
  const sidebar = document.getElementById('sidebar');
  const collapsed = sidebar.classList.contains('collapsed');
  const sideW = collapsed ? 0 : 230;
  W = canvas.width = window.innerWidth - sideW;
  H = canvas.height = window.innerHeight;
  layoutNodes(W, H);
  draw();
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Draw edges first
  const drawn = new Set();
  NODES.forEach(n => {
    n.links.forEach(lid => {
      const key = [n.id, lid].sort().join('-');
      if (drawn.has(key)) return;
      drawn.add(key);
      const target = NODES.find(x => x.id === lid);
      if (!target) return;

      const strong = isStrong(n.id, lid);
      const isHovered = hoveredNode && (hoveredNode.id === n.id || hoveredNode.id === lid);
      const alpha = isHovered ? 0.9 : strong ? 0.35 : 0.1;
      const lw = strong ? 1.8 : 1;

      // gradient line
      const grad = ctx.createLinearGradient(n.x, n.y, target.x, target.y);
      const c1 = hexToRgb(CAT_COLORS[n.cat]);
      const c2 = hexToRgb(CAT_COLORS[target.cat]);
      grad.addColorStop(0,   `rgba(${c1},${alpha})`);
      grad.addColorStop(1,   `rgba(${c2},${alpha})`);

      ctx.beginPath();
      ctx.moveTo(n.x, n.y);
      ctx.lineTo(target.x, target.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = isHovered ? lw * 2.5 : lw;
      ctx.stroke();
    });
  });

  // Draw nodes
  NODES.forEach(n => {
    const isHov = hoveredNode && hoveredNode.id === n.id;
    const isLinked = hoveredNode && hoveredNode.links.includes(n.id);
    const col = CAT_COLORS[n.cat];
    const rgb = hexToRgb(col);
    const r = n.r;

    // Outer glow
    if (isHov || isLinked) {
      const glow = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, r * 2.8);
      glow.addColorStop(0, `rgba(${rgb},${isHov ? 0.35 : 0.15})`);
      glow.addColorStop(1, `rgba(${rgb},0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Node circle
    const fill = ctx.createRadialGradient(n.x - r*0.3, n.y - r*0.3, 0, n.x, n.y, r);
    fill.addColorStop(0, `rgba(${rgb},${isHov ? 0.55 : 0.2})`);
    fill.addColorStop(1, `rgba(${rgb},${isHov ? 0.15 : 0.06})`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${rgb},${isHov ? 0.9 : isLinked ? 0.6 : 0.35})`;
    ctx.lineWidth = isHov ? 2 : 1.2;
    ctx.stroke();

    // Label
    if (showLabels || isHov) {
      // Module code inside
      ctx.fillStyle = isHov ? col : `rgba(${rgb},0.85)`;
      ctx.font = `600 ${r > 26 ? 11 : 10}px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y);
    }

    // Title below node
    if (showLabels) {
      ctx.fillStyle = isHov ? 'rgba(232,240,255,0.95)' : 'rgba(122,143,175,0.65)';
      ctx.font = `${isHov ? 500 : 400} ${isHov ? 11 : 10}px 'Sora', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const shortTitle = n.title.length > 18 ? n.title.slice(0,17)+'…' : n.title;
      ctx.fillText(shortTitle, n.x, n.y + r + 5);
    }
  });

  ctx.restore();
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
function canvasToWorld(mx, my) {
  return { x: (mx - offsetX) / scale, y: (my - offsetY) / scale };
}

function nodeAt(mx, my) {
  const { x, y } = canvasToWorld(mx, my);
  return NODES.find(n => Math.hypot(n.x - x, n.y - y) < n.r + 6) || null;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragging) {
    offsetX += e.clientX - lastMX;
    offsetY += e.clientY - lastMY;
    lastMX = e.clientX; lastMY = e.clientY;
    draw(); return;
  }

  const node = nodeAt(mx, my);
  if (node !== hoveredNode) {
    hoveredNode = node;
    draw();
    if (node) showTooltip(node, e.clientX, e.clientY);
    else hideTooltip();
  } else if (node) {
    moveTooltip(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true; lastMX = e.clientX; lastMY = e.clientY;
  canvas.style.cursor = 'grabbing';
});
canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
canvas.addEventListener('mouseleave', () => { dragging = false; hideTooltip(); hoveredNode = null; draw(); });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(3, Math.max(0.35, scale * delta));
  offsetX = mx - (mx - offsetX) * (newScale / scale);
  offsetY = my - (my - offsetY) * (newScale / scale);
  scale = newScale;
  draw();
}, { passive: false });

// Touch support
let lastDist = 0, lastTX = 0, lastTY = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastTX = e.touches[0].clientX;
    lastTY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    offsetX += e.touches[0].clientX - lastTX;
    offsetY += e.touches[0].clientY - lastTY;
    lastTX = e.touches[0].clientX;
    lastTY = e.touches[0].clientY;
    draw();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const delta = dist / lastDist;
    scale = Math.min(3, Math.max(0.35, scale * delta));
    lastDist = dist;
    draw();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(node, mx, my) {
  document.getElementById('ttTag').textContent = node.id.toUpperCase() + ' · ' + Object.keys(CAT_COLORS).find(k => k === node.cat).toUpperCase().replace('MEASURE','INDICATORS').replace('DEMAND','DEMAND & SUPPLY').replace('INTL','INTERNATIONAL').replace('POLICY','POLICY').replace('CORE','CORE FRAMEWORK');
  document.getElementById('ttTitle').textContent = node.title;
  document.getElementById('ttTitle').style.color = CAT_COLORS[node.cat];
  document.getElementById('ttBody').textContent = node.desc;
  const linkedNodes = node.links.map(id => NODES.find(n => n.id === id)).filter(Boolean);
  if (linkedNodes.length) {
    const list = document.getElementById('ttLinkList');
    list.innerHTML = linkedNodes.map(n =>
      `<div class="tt-link-item" style="color:${CAT_COLORS[n.cat]}">→ ${n.title}</div>`
    ).join('');
    document.getElementById('ttLinks').style.display = 'block';
  } else {
    document.getElementById('ttLinks').style.display = 'none';
  }
  moveTooltip(mx, my);
  tooltip.classList.add('show');
}
function moveTooltip(mx, my) {
  const tw = 300, th = 180;
  let left = mx + 16;
  let top  = my + 16;
  if (left + tw > window.innerWidth - 10)  left = mx - tw - 16;
  if (top  + th > window.innerHeight - 10) top  = my - th - 16;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}
function hideTooltip() { tooltip.classList.remove('show'); }

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function resetView() {
  offsetX = 0; offsetY = 0; scale = 1;
  draw();
}
function toggleLabels() {
  showLabels = !showLabels;
  draw();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const toggle = document.getElementById('sbToggle');
  const collapsed = sb.classList.toggle('collapsed');
  toggle.classList.toggle('off', collapsed);
  toggle.innerHTML = collapsed ? '&#8250;' : '&#8249;';
  canvas.classList.toggle('wide', collapsed);
  document.getElementById('legend').classList.toggle('wide', collapsed);
  document.getElementById('pageTitle').classList.toggle('wide', collapsed);
  setTimeout(resize, 320);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  resize();
  window.addEventListener('resize', resize);
});
</script>
